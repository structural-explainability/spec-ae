# ============================================================
# SE_MANIFEST.toml (Repository Declaration)
# spec-ae
# ============================================================

schema = "se-manifest-schema"
schema_url = "https://github.com/structural-explainability/se-manifest-schema/blob/main/manifest-schema.toml"

# === Identity ===

[meta]
purpose = "To make explicit the boundaries, responsibilities, and expectations of this repository relative to others."

[repo]
name = "spec-ae"
org  = "structural-explainability"
class = "spec"
kind = "accountable-entity"
status = "active"
since = "2025"
summary = "Defines accountable entity kinds and identity-and-persistence regimes."

[layer]
space = "SE"
role  = "specification"

# === Dependencies ===

[depends]
required = ["structural-explainability/spec-se@v1"]
optional = []

# === Provided artifacts ===

[provides]
artifacts = [
  "README.md",
  "SPEC.md",
  "IDENTIFIERS.md",
  "CONFORMANCE.md",
  "data/spec/requirements.json",
  "data/spec/conformance-checks.json",
  "data/spec/scope-exclusions.json",
]

# === Scope ===

[scope]
includes = [
  "accountable entity kinds",
  "identity regimes and persistence constraints",
  "structural conformance requirements",
]
excludes = [
  "domain ontologies",
  "explanations or interpretive claims",
  "causal or normative assertions",
  "identifier scheme monopoly",
]

# === Validation ===

[validation]
entrypoint = "uv run se-validate"
export_check_entrypoint = "uv run se-ref-export --check"
reference_entrypoint = "uv run se-ref-validate"
strict_entrypoint = "uv run se-validate --strict"
tag_entrypoint = "uv run python -m se_manifest_schema validate --strict --require-tag"

# === Behavior / governance ===

[naming]
pattern = "spec-*"

[governance]
authority = "structural-explainability"

# === External references ===

[citation]
cff = "CITATION.cff"
preferred = "spec"

[traceability]
identifier_map = "structural-explainability/spec-ae/IDENTIFIERS.md"
